<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KarbonLens — Indonesia's carbon market, in one terminal</title>
  <style>
    :root {
      --bg: #FAFAF7;
      --surface: #FFFFFF;
      --surface-2: #F1EFE8;

      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);

      --text: #1A1A1A;
      --text-2: #5F5E5A;
      --text-3: #888780;

      --info-bg: #E6F1FB;
      --info-fg: #185FA5;
      --success-bg: #E1F5EE;
      --success-fg: #0F6E56;
      --warning-bg: #FAEEDA;
      --warning-fg: #854F0B;
      --danger-bg: #FCEBEB;
      --danger-fg: #A32D2D;

      --chart-blue: #378ADD;
      --chart-teal: #1D9E75;
      --chart-coral: #D85A30;
      --chart-amber: #BA7517;
      --chart-red: #E24B4A;

      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    .tnum { font-variant-numeric: tabular-nums; }

    /* ===== Top nav ===== */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }
    .topnav-inner {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .brand-mark {
      width: 24px;
      height: 24px;
      background: var(--info-bg);
      color: var(--info-fg);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-weight: 500;
      font-size: 13px;
    }
    .brand-word {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.1px;
    }
    .nav-links {
      display: flex;
      gap: 2px;
      margin-left: 8px;
      flex: 1;
    }
    .nav-link {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .nav-link:hover { background: var(--surface-2); }
    .nav-link.active { color: var(--text); background: var(--surface-2); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bell {
      position: relative;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-2);
    }
    .bell:hover { background: var(--surface-2); }
    .bell .dot {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--danger-fg);
    }
    .pro-badge {
      font-size: 11px;
      color: var(--info-fg);
      background: var(--info-bg);
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 500;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
    }

    /* ===== Page layout ===== */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .page-title {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 4px;
      letter-spacing: -0.2px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-2);
      margin: 0;
    }
    .page-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ===== Section labels ===== */
    .section-label {
      font-size: 11px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    /* ===== Cards ===== */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .card-pad-lg { padding: 20px 24px; }

    .stat-card {
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 14px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.3px;
    }
    .stat-value.warning { color: var(--warning-fg); }
    .stat-value.success { color: var(--success-fg); }
    .stat-delta {
      font-size: 11px;
      margin-top: 3px;
      font-variant-numeric: tabular-nums;
    }
    .stat-delta.up { color: var(--success-fg); }
    .stat-delta.down { color: var(--danger-fg); }
    .stat-delta.neutral { color: var(--text-3); }

    /* ===== Buttons ===== */
    .btn {
      background: transparent;
      color: var(--text);
      border: 0.5px solid var(--border-strong);
      padding: 7px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface-2); }
    .btn-primary {
      background: var(--text);
      color: var(--surface);
      border-color: var(--text);
    }
    .btn-primary:hover { background: #2a2a2a; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ===== Inputs ===== */
    .input, .select {
      background: var(--surface);
      color: var(--text);
      border: 0.5px solid var(--border-strong);
      padding: 7px 12px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-family: inherit;
    }
    .input:focus, .select:focus {
      outline: 2px solid var(--info-fg);
      outline-offset: -1px;
    }
    .input::placeholder { color: var(--text-3); }
    .select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' fill='none' stroke='%235F5E5A' stroke-width='1.2'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 28px;
    }

    /* ===== Score badge ===== */
    .score-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
      min-width: 36px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .score-high { background: var(--success-bg); color: var(--success-fg); }
    .score-mid  { background: var(--info-bg);    color: var(--info-fg); }
    .score-low  { background: var(--warning-bg); color: var(--warning-fg); }

    /* ===== Pills ===== */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: var(--radius-md);
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .pill-info    { background: var(--info-bg);    color: var(--info-fg); }
    .pill-success { background: var(--success-bg); color: var(--success-fg); }
    .pill-warning { background: var(--warning-bg); color: var(--warning-fg); }
    .pill-danger  { background: var(--danger-bg);  color: var(--danger-fg); }
    .pill-neutral { background: var(--surface-2);  color: var(--text-2); }
    .pill .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ===== Tags ===== */
    .tag {
      display: inline-block;
      font-size: 10px;
      color: var(--text-3);
      border: 0.5px solid var(--border-strong);
      padding: 2px 7px;
      border-radius: 4px;
      margin-right: 4px;
      white-space: nowrap;
    }

    /* ===== Tables ===== */
    table.data {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.data thead tr {
      border-bottom: 0.5px solid var(--border-strong);
    }
    table.data th {
      text-align: left;
      padding: 10px 12px 10px 0;
      font-size: 11px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
      white-space: nowrap;
    }
    table.data tbody tr {
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    table.data tbody tr:hover { background: var(--surface-2); }
    table.data tbody tr:last-child { border-bottom: none; }
    table.data td {
      padding: 12px 12px 12px 0;
      vertical-align: middle;
    }
    table.data td.right {
      text-align: right;
      padding-right: 12px;
      padding-left: 12px;
      font-variant-numeric: tabular-nums;
    }
    table.data td.right:last-child,
    table.data th.right:last-child { padding-right: 0; }
    table.data .row-name {
      font-weight: 500;
    }
    table.data .row-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* ===== Grids ===== */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .project-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .detail-two-col {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    /* ===== Project preview card (landing) ===== */
    .proj-preview {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .proj-preview:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    .proj-preview-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    .proj-preview-name {
      font-size: 15px;
      font-weight: 500;
      margin: 0 0 6px;
    }
    .proj-preview-meta {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 12px;
    }
    .proj-preview-tags {
      margin-top: 4px;
    }

    /* ===== Score breakdown bars ===== */
    .score-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .score-row-label {
      font-size: 13px;
      color: var(--text-2);
    }
    .score-row-value {
      font-size: 13px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .score-track {
      grid-column: 1 / -1;
      height: 5px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .score-fill { height: 100%; border-radius: 3px; }
    .score-fill.success { background: var(--success-fg); }
    .score-fill.info { background: var(--info-fg); }
    .score-fill.warning { background: var(--warning-fg); }

    /* ===== News items ===== */
    .news-item {
      background: var(--surface-2);
      border-left: 2px solid var(--border-strong);
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 8px;
    }
    .news-item.positive { border-left-color: var(--info-fg); }
    .news-item.warning  { border-left-color: var(--chart-amber); }
    .news-item.neutral  { border-left-color: var(--border-strong); }
    .news-item-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      line-height: 1.4;
    }
    .news-item-meta {
      font-size: 11px;
      color: var(--text-3);
    }

    /* ===== Timeline ===== */
    .timeline-item {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 20px;
      padding: 18px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-date-status {
      font-size: 11px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    .timeline-date {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      margin-bottom: 4px;
    }
    .timeline-title {
      font-size: 15px;
      font-weight: 500;
      margin: 0 0 6px;
      line-height: 1.4;
    }
    .timeline-desc {
      font-size: 13px;
      color: var(--text-2);
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .timeline-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ===== Alerts ===== */
    .alert-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      align-items: flex-start;
    }
    .alert-row:last-child { border-bottom: none; }
    .alert-row:hover { background: var(--surface-2); margin: 0 -12px; padding-left: 12px; padding-right: 12px; border-radius: 6px; }
    .alert-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 7px;
      margin-left: 8px;
      background: var(--border-strong);
    }
    .alert-status-dot.unread { background: var(--info-fg); }
    .alert-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .alert-project {
      font-size: 12px;
      color: var(--text-3);
    }
    .alert-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 3px;
    }
    .alert-desc {
      font-size: 13px;
      color: var(--text-2);
    }
    .alert-time {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      margin-top: 2px;
    }

    /* ===== Filter bar ===== */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }
    .filter-bar .input { flex: 1; min-width: 240px; }

    /* ===== Footer ===== */
    .page-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-3);
      margin-top: 16px;
      padding-top: 14px;
    }

    /* ===== Landing page specifics ===== */
    .landing-hero {
      max-width: 760px;
      padding: 64px 0 48px;
    }
    .kicker {
      display: inline-block;
      margin-bottom: 24px;
    }
    .hero-h1 {
      font-size: 40px;
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin: 0 0 20px;
      white-space: pre-line;
    }
    .hero-tag-en {
      font-size: 17px;
      color: var(--text-2);
      margin: 0 0 8px;
      line-height: 1.5;
      max-width: 640px;
    }
    .hero-tag-id {
      font-size: 14px;
      color: var(--text-3);
      font-style: italic;
      margin: 0 0 28px;
      max-width: 640px;
    }
    .hero-cta {
      display: flex;
      gap: 10px;
    }

    .section-block {
      margin-bottom: 48px;
    }
    .section-block-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .section-h2 {
      font-size: 17px;
      font-weight: 500;
      margin: 0;
    }
    .section-link {
      font-size: 13px;
      color: var(--info-fg);
      cursor: pointer;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .price-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      position: relative;
    }
    .price-card.featured {
      border: 1.5px solid var(--info-fg);
    }
    .price-card-badge {
      position: absolute;
      top: -10px;
      left: 22px;
      background: var(--info-fg);
      color: var(--surface);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }
    .price-tier {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 4px;
    }
    .price-amount {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.4px;
      margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
    }
    .price-amount .per { font-size: 14px; color: var(--text-3); font-weight: 400; }
    .price-features {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
    }
    .price-features li {
      font-size: 13px;
      color: var(--text-2);
      padding: 6px 0;
      border-top: 0.5px solid var(--border);
    }
    .price-features li:first-child { border-top: none; }

    .public-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: auto;
      font-size: 13px;
      color: var(--text-2);
    }
    .public-nav a { cursor: pointer; padding: 6px 8px; border-radius: 6px; }
    .public-nav a:hover { background: var(--surface-2); }

    .footer-bar {
      border-top: 0.5px solid var(--border);
      padding: 24px;
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      justify-content: space-between;
      max-width: 1200px;
      margin: 40px auto 0;
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 14px;
    }
    .breadcrumb a {
      color: var(--info-fg);
      cursor: pointer;
    }
    .breadcrumb a:hover { text-decoration: underline; }

    .range-pills {
      display: inline-flex;
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 2px;
      gap: 2px;
    }
    .range-pill {
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-2);
      background: transparent;
      border: none;
      font-family: inherit;
    }
    .range-pill.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 500;
    }

    .legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-2);
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
    .legend-line {
      width: 14px;
      height: 2px;
    }

    /* ===== Satellite map viewer ===== */
    .sat-viewer {
      background: #0f1411;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-lg);
      overflow: hidden;
      color: #E8E8E5;
      font-size: 12px;
    }
    .sat-toolbar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 10px 14px;
      background: #161b18;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
    }
    .sat-toolbar-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .sat-toolbar-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }
    .sat-pill-mono {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11px;
      color: #E8E8E5;
      background: rgba(255,255,255,0.06);
      padding: 3px 8px;
      border-radius: 4px;
      font-variant-numeric: tabular-nums;
    }
    .sat-segmented {
      display: inline-flex;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 2px;
      gap: 1px;
    }

      const padL = 48, padR = 16, padT = 28, padB = 32;
      const innerW = W - padL - padR;
      const innerH = H - padT - padB;
      const barW = (innerW / data.length) * 0.55;
      const gap = (innerW / data.length) * 0.45;
      const yTicks = [0, 3, 6, 10];
      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
          {yTicks.map(t => {
            const y = padT + innerH - (t / max) * innerH;
            return (
              <g key={t}>
                <line x1={padL} y1={y} x2={W - padR} y2={y} stroke={t === 0 ? '#B4B2A9' : '#D3D1C7'} strokeWidth="0.5" strokeDasharray={t === 0 ? '' : '2,3'} />
                <text x={padL - 6} y={y + 3} textAnchor="end" fontSize="10" fill="#888780">{t === 0 ? '0' : t + 'M'}</text>
              </g>
            );
          })}
          {data.map((d, i) => {
            const x = padL + i * (innerW / data.length) + gap / 2;
            const h = (d.value / max) * innerH;
            const y = padT + innerH - h;
            return (
              <g key={d.year}>
                <rect x={x} y={y} width={barW} height={h} fill="#378ADD" opacity="0.88" rx="2"/>
                <text x={x + barW / 2} y={y - 6} textAnchor="middle" fontSize="11" fontWeight="500" fill="#185FA5">{d.value}M</text>
                <text x={x + barW / 2} y={H - 12} textAnchor="middle" fontSize="11" fill="#888780">{d.year}</text>
              </g>
            );
          })}
        </svg>
      );

    function PriceChart({ series, months }) {

        { key: 'IDTBS', color: '#1D9E75' },
        { key: 'IDNBS', color: '#D85A30' }

      const xFor = (i) => padL + (i / (months.length - 1)) * innerW;
      const yFor = (v) => padT + innerH - (v / max) * innerH;

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>

            const pts = series[key];
            const segments = [];
            let cur = [];
            pts.forEach((v, i) => {
              if (v == null) {
                if (cur.length) segments.push(cur);
                cur = [];
              } else {
                cur.push([xFor(i), yFor(v)]);

    // ============== Satellite map viewer ==============
    const SAT_W = 800, SAT_H = 460;

    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = seed;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    const BOUNDARY = "M 110,70 Q 180,40 290,50 Q 410,55 500,80 Q 600,115 620,200 Q 615,290 540,360 Q 440,410 320,395 Q 200,380 140,330 Q 70,260 80,170 Q 90,105 110,70 Z";

    function pointInBounds(x, y) {
      const cx = 350, cy = 220;
      const rx = 280, ry = 180;
      return ((x - cx) * (x - cx)) / (rx * rx) + ((y - cy) * (y - cy)) / (ry * ry) < 1;
    }

    function buildNdviCells(seed) {
      const rand = mulberry32(seed);
      const cols = 64, rows = 36;
      const cw = SAT_W / cols, ch = SAT_H / rows;
      const cells = [];
      const degraded = [
        { x: 240, y: 140, r: 55 },
        { x: 410, y: 110, r: 40 },
        { x: 510, y: 250, r: 65 },
        { x: 200, y: 300, r: 45 }
      ];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = c * cw + cw / 2;
          const y = r * ch + ch / 2;
          let n = 0.62 + 0.20 * Math.sin(c * 0.31 + r * 0.22) + 0.10 * Math.cos(c * 0.55 - r * 0.41);
          n += (rand() - 0.5) * 0.10;
          degraded.forEach(d => {
            const dx = x - d.x, dy = y - d.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < d.r) n -= (1 - dist / d.r) * 0.55;
          });
          n = Math.max(-0.1, Math.min(0.92, n));
          cells.push({ x: c * cw, y: r * ch, w: cw + 0.5, h: ch + 0.5, n, inside: pointInBounds(x, y) });
        }
      }
      return cells;
    }

    function buildCanopyCells(seed) {
      const rand = mulberry32(seed + 11);
      const cols = 64, rows = 36;
      const cw = SAT_W / cols, ch = SAT_H / rows;
      const cells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = c * cw + cw / 2;
          const y = r * ch + ch / 2;
          let h = 18 + 10 * Math.sin(c * 0.18 + r * 0.31) + 6 * Math.cos(c * 0.4 - r * 0.2);
          h += (rand() - 0.5) * 4;
          const cx = 350, cy = 220;
          const d = Math.sqrt(((x - cx) ** 2) / (260 * 260) + ((y - cy) ** 2) / (170 * 170));
          h -= d * 8;
          h = Math.max(0, Math.min(35, h));
          cells.push({ x: c * cw, y: r * ch, w: cw + 0.5, h: ch + 0.5, height: h, inside: pointInBounds(x, y) });
        }
      }
      return cells;
    }

    function buildTrueColorCells(seed) {
      const rand = mulberry32(seed + 23);
      const cols = 96, rows = 54;
      const cw = SAT_W / cols, ch = SAT_H / rows;
      const cells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = c * cw + cw / 2;
          const y = r * ch + ch / 2;
          const inside = pointInBounds(x, y);
          let R, G, B;
          const noise = (rand() - 0.5) * 18;
          if (inside) {
            R = 38 + noise; G = 64 + noise; B = 36 + noise;
            const v = Math.sin(c * 0.3) * Math.cos(r * 0.25);
            R += v * 6; G += v * 10; B += v * 4;
          } else {
            const t = Math.sin(c * 0.12 + r * 0.18);
            if (t > 0.5) { R = 78 + noise; G = 92 + noise; B = 60 + noise; }
            else if (t < -0.4) { R = 52 + noise; G = 82 + noise; B = 110 + noise; }
            else { R = 110 + noise; G = 96 + noise; B = 72 + noise; }
          }
          cells.push({ x: c * cw, y: r * ch, w: cw + 0.5, h: ch + 0.5, fill: `rgb(${R|0},${G|0},${B|0})` });
        }
      }
      return cells;
    }

    function ndviColor(n) {
      const stops = [
        { v: -0.1, c: [180, 120, 70] },
        { v:  0.15, c: [220, 200, 95] },
        { v:  0.35, c: [180, 200, 70] },
        { v:  0.55, c: [70, 145, 60] },
        { v:  0.92, c: [12, 78, 36] }
      ];
      for (let i = 0; i < stops.length - 1; i++) {
        const a = stops[i], b = stops[i + 1];
        if (n <= b.v) {
          const t = (n - a.v) / (b.v - a.v);
          const r = a.c[0] + (b.c[0] - a.c[0]) * t;
          const g = a.c[1] + (b.c[1] - a.c[1]) * t;
          const bl = a.c[2] + (b.c[2] - a.c[2]) * t;
          return `rgb(${r|0},${g|0},${bl|0})`;
        }
      }
      return `rgb(12,78,36)`;
    }

    function canopyColor(h) {
      const t = Math.min(1, h / 35);
      const stops = [
        { v: 0,    c: [240, 232, 210] },
        { v: 0.4,  c: [120, 195, 170] },
        { v: 0.75, c: [40,  138, 130] },
        { v: 1,    c: [12,  62,  78] }
      ];
      for (let i = 0; i < stops.length - 1; i++) {
        const a = stops[i], b = stops[i + 1];
        if (t <= b.v) {
          const tt = (t - a.v) / (b.v - a.v);
          const r = a.c[0] + (b.c[0] - a.c[0]) * tt;
          const g = a.c[1] + (b.c[1] - a.c[1]) * tt;
          const bl = a.c[2] + (b.c[2] - a.c[2]) * tt;
          return `rgb(${r|0},${g|0},${bl|0})`;
        }
      }
      return `rgb(12,62,78)`;
    }

            <div className="page-footer">
              <span>Source: JDIH Kemenhut, KLH, Setneg, OJK · Updated 2 hours ago</span>
              <span>{filtered.length} of {D.regulatory.length} events</span>
            </div>
          </div>
        </div>
      );
    }

    // ============== Screen: Alerts ==============
    function Alerts() {
      const D = window.KL_DATA;
      const [filter, setFilter] = React.useState('All types');
      const [alerts, setAlerts] = React.useState(D.alerts);

      const filtered = alerts.filter(a => {
        if (filter === 'All types') return true;
        return a.type === filter.toLowerCase();
      });

      const sevPill = (sev, label) => {
        const cls = 'pill-' + sev;
        return <span className={'pill ' + cls}>{label}</span>;
      };

      const markRead = (id) => {
        setAlerts(alerts.map(a => a.id === id ? { ...a, read: true } : a));
      };

      const unread = alerts.filter(a => !a.read).length;

      return (
        <div data-screen-label="06 Alerts">
          <TopNav active="alerts" />
          <div className="page">
            <div className="page-header">
              <div>
                <h1 className="page-title">Alerts</h1>
                <p className="page-subtitle">Real-time signals across projects you watch · {unread} unread</p>
              </div>
              <div className="page-actions">
                <select className="select" value={filter} onChange={e => setFilter(e.target.value)}>
                  {['All types','Reversal','Price','Regulatory','News','Retirement','Issuance'].map(x => <option key={x}>{x}</option>)}
                </select>
                <button className="btn">Settings</button>
              </div>
            </div>

            <div className="card card-pad-lg">
              {filtered.map(a => (
                <div key={a.id} className="alert-row" onClick={() => markRead(a.id)}>
                  <div className={'alert-status-dot ' + (a.read ? '' : 'unread')} />
                  <div>
                    <div className="alert-top-row">
                      {sevPill(a.severity, a.typeLabel)}
                      <span className="alert-project">{a.project}</span>
                    </div>
                    <div className="alert-title">{a.title}</div>
                    <div className="alert-desc">{a.desc}</div>
                  </div>
                  <div className="alert-time tnum">{a.time}</div>
                </div>
              ))}
              {filtered.length === 0 && (
                <div style={{ padding: '32px 0', textAlign: 'center', color: 'var(--text-3)' }}>
                  No alerts of this type.
                </div>
              )}
            </div>

            <div className="page-footer">
              <span>Pipeline status: nominal · Last sync 23 seconds ago</span>
              <span>{filtered.length} of {alerts.length} alerts</span>
            </div>
          </div>
        </div>
      );
    }

    // ============== Router / App ==============
    function App() {
      const [route, setRoute] = React.useState(window.location.hash || '#/');

      React.useEffect(() => {
        const onChange = () => {
          setRoute(window.location.hash || '#/');
          window.scrollTo(0, 0);
          try { localStorage.setItem('kl_last_route', window.location.hash || '#/'); } catch (e) {}
        };
        window.addEventListener('hashchange', onChange);
        if (!window.location.hash || window.location.hash === '#' || window.location.hash === '#/') {
          try {
            const last = localStorage.getItem('kl_last_route');
            if (last && last !== '#/') {
              window.location.hash = last;
              return;
            }
          } catch (e) {}
        }
        return () => window.removeEventListener('hashchange', onChange);
      }, []);

      const path = route.replace(/^#/, '');

      if (path === '/' || path === '') return <Landing />;
      if (path === '/projects') return <Projects />;
      if (path.startsWith('/projects/')) {
        const id = path.split('/')[2];
        return <ProjectDetail id={id} />;
      }
      if (path === '/prices') return <Prices />;
      if (path === '/regulatory') return <Regulatory />;
      if (path === '/alerts') return <Alerts />;

      return <Landing />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
