# KarbonLens — backup cron snippet (T20).
#
# Append to the karbonlens user's crontab (T19 owns the primary crontab;
# this snippet is appended rather than merged into T19's karbonlens.crontab
# to keep T20 files self-contained and avoid cross-story edits).
#
# Install:
#   # as root or a user with sudo:
#   crontab -u karbonlens -l 2>/dev/null > /tmp/kl-crontab.bak
#   ( crontab -u karbonlens -l 2>/dev/null; cat /opt/karbonlens/scripts/pg-cron.conf ) \
#     | crontab -u karbonlens -
#   crontab -u karbonlens -l  # verify
#
# Uninstall: re-run `crontab -u karbonlens -` with pg lines filtered out.

# Nightly pg_dump — 02:00 UTC (09:00 WIB, before any scraper runs).
0 2 * * * /opt/karbonlens/scripts/pg-backup.sh >> /var/log/karbonlens/backup.log 2>&1

# Weekly restore drill — Sun 05:00 UTC. Runs as karbonlens; uses sudo -u
# postgres internally for createdb/DROP DATABASE. The karbonlens user must
# therefore have NOPASSWD sudo for `postgres psql/createdb` — see
# docs/runbooks/backup-restore.md "One-time setup".
0 5 * * 0 /opt/karbonlens/scripts/pg-restore-drill.sh >> /var/log/karbonlens/restore-drill.log 2>&1
