<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- True-color basemap gradient (dark forest → sea) -->
    <linearGradient id="terrain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3826"/>
      <stop offset="35%" stop-color="#233d28"/>
      <stop offset="65%" stop-color="#2f4a30"/>
      <stop offset="100%" stop-color="#0f2418"/>
    </linearGradient>

    <!-- Forest canopy texture -->
    <radialGradient id="canopy1" cx="0.35" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#3d5a3b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3d5a3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="canopy2" cx="0.7" cy="0.6" r="0.45">
      <stop offset="0%" stop-color="#4a6b42" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4a6b42" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="canopy3" cx="0.55" cy="0.25" r="0.3">
      <stop offset="0%" stop-color="#556b3a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#556b3a" stop-opacity="0"/>
    </radialGradient>

    <!-- Cleared plantation patches -->
    <radialGradient id="clear1" cx="0.8" cy="0.3" r="0.12">
      <stop offset="0%" stop-color="#6d5e3c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6d5e3c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="clear2" cx="0.22" cy="0.72" r="0.14">
      <stop offset="0%" stop-color="#79654a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#79654a" stop-opacity="0"/>
    </radialGradient>

    <!-- Alert pulse -->
    <radialGradient id="alertGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E24B4A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E24B4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#BA7517" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BA7517" stop-opacity="0"/>
    </radialGradient>

    <!-- Right-side fade so overlay text stays legible -->
    <linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F1411" stop-opacity="0.78"/>
      <stop offset="55%" stop-color="#0F1411" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0F1411" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom fade -->
    <linearGradient id="scrimBottom" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0F1411" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F1411" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="boundaryClip">
      <path d="M 330,150 Q 470,110 680,130 Q 880,140 1010,200 Q 1100,270 1080,390 Q 1020,510 840,530 Q 640,520 490,480 Q 340,430 300,330 Q 290,230 330,150 Z"/>
    </clipPath>
  </defs>

  <!-- Base terrain -->
  <rect width="1200" height="630" fill="url(#terrain)"/>
  <rect width="1200" height="630" fill="url(#canopy1)"/>
  <rect width="1200" height="630" fill="url(#canopy2)"/>
  <rect width="1200" height="630" fill="url(#canopy3)"/>
  <rect width="1200" height="630" fill="url(#clear1)"/>
  <rect width="1200" height="630" fill="url(#clear2)"/>

  <!-- Haze / cloud wisps -->
  <ellipse cx="950" cy="120" rx="180" ry="32" fill="#FFFFFF" opacity="0.08"/>
  <ellipse cx="180" cy="530" rx="140" ry="26" fill="#FFFFFF" opacity="0.05"/>

  <!-- Graticule -->
  <g opacity="0.18" stroke="#FFFFFF" stroke-width="0.6" stroke-dasharray="3,6">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>
  <g fill="#FFFFFF" opacity="0.32" font-family="ui-monospace, Menlo, monospace" font-size="11">
    <text x="404" y="18">113.04°E</text>
    <text x="604" y="18">113.12°E</text>
    <text x="804" y="18">113.20°E</text>
    <text x="1004" y="18">113.28°E</text>
  </g>

  <!-- Project boundary (Katingan-ish) — double stroke (white + dashed dark) -->
  <path d="M 330,150 Q 470,110 680,130 Q 880,140 1010,200 Q 1100,270 1080,390 Q 1020,510 840,530 Q 640,520 490,480 Q 340,430 300,330 Q 290,230 330,150 Z"
        fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.96"/>
  <path d="M 330,150 Q 470,110 680,130 Q 880,140 1010,200 Q 1100,270 1080,390 Q 1020,510 840,530 Q 640,520 490,480 Q 340,430 300,330 Q 290,230 330,150 Z"
        fill="none" stroke="#4FB89C" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- RADD alerts inside polygon — pulsing halos -->
  <g>
    <!-- 3 high-confidence -->
    <g transform="translate(540,230)">
      <circle r="42" fill="url(#alertGlow)"/>
      <circle r="14" fill="#E24B4A" opacity="0.28"/>
      <circle r="5.5" fill="#E24B4A" stroke="#FFFFFF" stroke-width="1.5"/>
    </g>
    <g transform="translate(680,205)">
      <circle r="38" fill="url(#alertGlow)"/>
      <circle r="12" fill="#E24B4A" opacity="0.28"/>
      <circle r="5" fill="#E24B4A" stroke="#FFFFFF" stroke-width="1.5"/>
    </g>
    <g transform="translate(870,260)">
      <circle r="44" fill="url(#alertGlow)"/>
      <circle r="14" fill="#E24B4A" opacity="0.28"/>
      <circle r="5.5" fill="#E24B4A" stroke="#FFFFFF" stroke-width="1.5"/>
    </g>
    <!-- 4 nominal amber -->
    <g transform="translate(470,380)">
      <circle r="30" fill="url(#amberGlow)"/>
      <circle r="9" fill="#BA7517" opacity="0.3"/>
      <circle r="4" fill="#BA7517" stroke="#FFFFFF" stroke-width="1.2"/>
    </g>
    <g transform="translate(620,420)">
      <circle r="30" fill="url(#amberGlow)"/>
      <circle r="9" fill="#BA7517" opacity="0.3"/>
      <circle r="4" fill="#BA7517" stroke="#FFFFFF" stroke-width="1.2"/>
    </g>
    <g transform="translate(790,440)">
      <circle r="30" fill="url(#amberGlow)"/>
      <circle r="9" fill="#BA7517" opacity="0.3"/>
      <circle r="4" fill="#BA7517" stroke="#FFFFFF" stroke-width="1.2"/>
    </g>
    <g transform="translate(960,380)">
      <circle r="30" fill="url(#amberGlow)"/>
      <circle r="9" fill="#BA7517" opacity="0.3"/>
      <circle r="4" fill="#BA7517" stroke="#FFFFFF" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Left scrim so brand copy sits on readable ground -->
  <rect x="0" y="0" width="560" height="630" fill="url(#scrim)"/>
  <rect x="0" y="430" width="1200" height="200" fill="url(#scrimBottom)"/>

  <!-- Brand mark + wordmark -->
  <g transform="translate(56,60)">
    <svg x="0" y="0" width="32" height="32" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="5.3" stroke="#4FB89C" stroke-width="1.1" fill="none"/>
      <circle cx="7" cy="7" r="1.8" fill="#4FB89C"/>
    </svg>
    <text x="42" y="24" font-family="'IBM Plex Sans', -apple-system, sans-serif" font-size="19" font-weight="500" fill="#FFFFFF" letter-spacing="-0.2">KarbonLens</text>
  </g>

  <!-- Kicker chip -->
  <g transform="translate(56,116)">
    <rect width="290" height="30" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
    <circle cx="14" cy="15" r="3.2" fill="#E24B4A">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="26" y="19" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#FFFFFF" letter-spacing="1">SENTINEL-2 · 2026-04-15 03:42 UTC · LIVE</text>
  </g>

  <!-- Headline (Instrument Serif feel) -->
  <g font-family="'Instrument Serif', 'Times New Roman', Georgia, serif" fill="#FFFFFF">
    <text x="56" y="226" font-size="72" font-weight="400" letter-spacing="-1.8">Indonesia&#8217;s carbon</text>
    <text x="56" y="302" font-size="72" font-weight="400" letter-spacing="-1.8">market, in one</text>
    <text x="56" y="378" font-size="72" font-weight="400" letter-spacing="-1.8" font-style="italic" fill="#4FB89C">terminal.</text>
  </g>

  <!-- Subtitle -->
  <text x="56" y="432" font-family="'IBM Plex Sans', -apple-system, sans-serif" font-size="19" fill="rgba(255,255,255,0.78)">
    Satellite MRV, prices, reversal alerts, and regulatory tracking —
  </text>
  <text x="56" y="458" font-family="'IBM Plex Sans', -apple-system, sans-serif" font-size="19" fill="rgba(255,255,255,0.78)">
    unified across Verra, SRN-PPI, Gold Standard, and IDXCarbon.
  </text>

  <!-- Bottom stats strip -->
  <g transform="translate(56,518)" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">
    <!-- divider above -->
    <line x1="0" y1="0" x2="1088" y2="0" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="0.5"/>
    <g transform="translate(0,28)">
      <text font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">PROJECTS INDEXED</text>
      <text y="30" font-family="'Instrument Serif', serif" font-size="34" fill="#FFFFFF">214</text>
    </g>
    <g transform="translate(230,28)">
      <text font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">KATINGAN PEATLAND</text>
      <text y="30" font-family="'Instrument Serif', serif" font-size="34" fill="#FFFFFF">149,800 <tspan font-size="18" fill="rgba(255,255,255,0.6)">ha</tspan></text>
    </g>
    <g transform="translate(560,28)">
      <text font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">RADD ALERTS · 90D</text>
      <text y="30" font-family="'Instrument Serif', serif" font-size="34" fill="#E24B4A">7</text>
    </g>
    <g transform="translate(780,28)">
      <text font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">karbonlens.netlify.app</text>
      <text y="30" font-family="'Instrument Serif', serif" font-size="22" fill="#4FB89C" font-style="italic">Open the terminal →</text>
    </g>
  </g>

  <!-- Scalebar bottom-right -->
  <g transform="translate(1050,28)" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#FFFFFF">
    <rect x="0" y="0" width="110" height="40" fill="#0a0d0c" opacity="0.55" rx="4"/>
    <line x1="12" y1="14" x2="98" y2="14" stroke="#FFFFFF" stroke-width="1.2"/>
    <line x1="12" y1="11" x2="12" y2="17" stroke="#FFFFFF" stroke-width="1.2"/>
    <line x1="55" y1="11" x2="55" y2="17" stroke="#FFFFFF" stroke-width="1.2"/>
    <line x1="98" y1="11" x2="98" y2="17" stroke="#FFFFFF" stroke-width="1.2"/>
    <text x="12" y="27">0</text>
    <text x="55" y="27" text-anchor="middle">5</text>
    <text x="98" y="27" text-anchor="end">10 km</text>
    <text x="55" y="36" text-anchor="middle" opacity="0.7">EPSG:4326</text>
  </g>
</svg>
